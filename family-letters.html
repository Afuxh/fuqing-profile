<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给爸爸妈妈的一封信</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --desk:#3E2C20;--paper:#FFF8E7;--paper-line:#E8DCC8;
  --warm:#E8985E;--gold:#D4A574;--brown:#4A3728;
  --seal:#C0392B;--seal-gold:#D4A017;--text:#3E2C20;--light:#8B7355
}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:'Georgia','STKaiti','KaiTi','SimSun',serif}
body{
  background:var(--desk);
  background-image:
    repeating-linear-gradient(90deg,transparent,transparent 50px,rgba(0,0,0,.02) 50px,rgba(0,0,0,.02) 100px),
    repeating-linear-gradient(0deg,transparent,transparent 300px,rgba(0,0,0,.04) 300px,rgba(0,0,0,.04) 301px),
    linear-gradient(160deg,#3E2C20,#5C3D2E 40%,#4A3328 70%,#3E2C20);
  display:flex;align-items:center;justify-content:center;
  transition:background 1s ease;
}
body.letter-mode{
  background:linear-gradient(180deg,#E8DCC8 0%,#D4C4A8 100%);
  overflow-y:auto;align-items:flex-start;justify-content:center
}

/* ===== STAGE 1: ENVELOPE ===== */
.envelope-scene{
  display:flex;flex-direction:column;align-items:center;
  perspective:1200px;cursor:pointer;
  transition:opacity 1s ease,transform 1s ease;
}
.envelope-scene.gone{opacity:0;transform:scale(0.8);pointer-events:none;position:absolute}
.envelope-wrap{animation:envFloat 3s ease-in-out infinite;position:relative;width:min(420px,85vw);height:min(280px,56vw)}
@keyframes envFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.envelope-body{
  position:absolute;bottom:0;width:100%;height:75%;
  background:linear-gradient(145deg,#F5E6D3,#EDD9C0 50%,#E8CCAA);
  border-radius:0 0 8px 8px;
  box-shadow:0 10px 40px rgba(0,0,0,.5),inset 0 0 40px rgba(0,0,0,.04);
  z-index:2
}
.envelope-body::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4
}
.envelope-flap{
  position:absolute;top:0;left:0;width:100%;height:55%;
  background:linear-gradient(180deg,#E8CCAA,#F0D8B8);
  clip-path:polygon(0 0,50% 70%,100% 0);
  transform-origin:top center;transition:transform 1.2s cubic-bezier(.4,.0,.2,1);
  z-index:3;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))
}
.envelope-flap.open{transform:rotateX(180deg)}
.envelope-inner{
  position:absolute;top:0;left:0;width:100%;height:55%;
  background:linear-gradient(180deg,#F5E6D3,#EDD9C0);
  clip-path:polygon(0 0,50% 70%,100% 0);z-index:1
}

/* Address */
.envelope-address{
  position:absolute;bottom:30px;left:30px;z-index:4;
  font-size:clamp(12px,2.5vw,15px);color:var(--brown);
  line-height:1.8;letter-spacing:.05em;opacity:.7
}
.envelope-address .to{font-size:clamp(14px,3vw,17px);font-weight:600;opacity:1}

/* Stamp */
.envelope-stamp{
  position:absolute;top:15px;right:20px;width:50px;height:60px;
  border:2px dashed var(--gold);border-radius:4px;z-index:4;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;opacity:.6;background:rgba(255,255,255,.3)
}

/* Seal */
.envelope-seal{
  position:absolute;bottom:60px;right:40px;width:60px;height:60px;
  border-radius:50%;z-index:5;
  background:radial-gradient(circle at 40% 40%,#E74C3C,var(--seal) 60%,#922B21);
  border:3px solid var(--seal-gold);
  box-shadow:0 2px 10px rgba(0,0,0,.3),inset 0 -2px 4px rgba(0,0,0,.2);
  display:flex;align-items:center;justify-content:center
}
.envelope-seal::after{
  content:'♥';font-size:22px;color:var(--seal-gold);
  text-shadow:0 1px 2px rgba(0,0,0,.3)
}

/* Hint */
.open-hint{
  margin-top:24px;font-size:14px;color:var(--gold);
  letter-spacing:.15em;opacity:.6;
  animation:pulse 2s ease-in-out infinite
}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}

/* ===== STAGE 2: LETTER ===== */
.letter-scene{
  display:none;flex-direction:column;align-items:center;
  width:100%;min-height:100vh;padding:40px 20px 60px
}
.letter-scene.active{display:flex}

.letter-paper{
  width:min(600px,90vw);min-height:min(700px,80vh);
  background:var(--paper);
  border-radius:4px;
  box-shadow:0 4px 24px rgba(0,0,0,.15),0 1px 4px rgba(0,0,0,.1);
  padding:min(60px,8vw) min(50px,7vw);
  position:relative;
  background-image:repeating-linear-gradient(
    transparent,transparent 31px,var(--paper-line) 31px,var(--paper-line) 32px
  );
  background-position:0 50px;
  animation:paperIn 1s cubic-bezier(.4,0,.2,1) forwards;
  opacity:0;transform:translateY(40px)
}
@keyframes paperIn{to{opacity:1;transform:translateY(0)}}

.letter-paper .greeting{
  font-size:clamp(18px,4vw,24px);color:var(--brown);
  margin-bottom:8px;letter-spacing:.1em;font-weight:600
}
.letter-paper .date-line{
  font-size:13px;color:var(--light);margin-bottom:30px;
  letter-spacing:.08em;font-style:italic
}
.letter-paper .sign-off{
  margin-top:40px;text-align:right;font-size:15px;
  color:var(--brown);letter-spacing:.1em
}

/* Theme section */
.theme-label{
  display:flex;align-items:center;gap:8px;
  margin:30px 0 16px;font-size:clamp(16px,3.5vw,20px);
  color:var(--warm);font-weight:600;letter-spacing:.08em
}
.theme-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--gold),transparent)
}

/* Quote blocks */
.letter-quote{
  margin:12px 0;padding:10px 14px;
  border-left:3px solid var(--warm);
  background:rgba(232,152,94,.06);
  border-radius:0 6px 6px 0;
  font-size:clamp(13px,2.8vw,15px);line-height:1.9;color:var(--text)
}
.letter-quote .q-sender{
  font-size:12px;color:var(--warm);font-weight:600;
  margin-bottom:4px;letter-spacing:.05em
}

/* Narration */
.letter-text{
  margin:10px 0;font-size:clamp(13px,2.8vw,15px);
  line-height:2;color:var(--text);text-indent:2em
}

/* Page nav */
.page-nav{
  display:flex;justify-content:center;align-items:center;
  gap:20px;margin-top:30px;padding-top:20px;
  border-top:1px dashed var(--paper-line)
}
.page-nav button{
  padding:8px 20px;border:1px solid var(--gold);
  background:transparent;color:var(--brown);border-radius:20px;
  font-family:inherit;font-size:13px;cursor:pointer;
  letter-spacing:.05em;transition:all .3s ease
}
.page-nav button:hover{background:var(--warm);color:#fff;border-color:var(--warm)}
.page-nav button:disabled{opacity:.3;cursor:default}
.page-num{font-size:12px;color:var(--light);letter-spacing:.1em}

/* ===== STAGE 3: REPLY ===== */
.reply-area{margin-top:30px}
.reply-area textarea{
  width:100%;min-height:120px;padding:12px;
  border:1px solid var(--paper-line);border-radius:8px;
  font-family:inherit;font-size:14px;color:var(--text);
  background:rgba(255,255,255,.5);resize:vertical;line-height:1.8;
  outline:none;transition:border-color .3s
}
.reply-area textarea:focus{border-color:var(--warm)}
.reply-area textarea::placeholder{color:var(--light);font-style:italic}
.seal-btn{
  margin-top:16px;padding:10px 28px;
  background:linear-gradient(135deg,var(--warm),var(--gold));
  color:#fff;border:none;border-radius:24px;
  font-family:inherit;font-size:14px;cursor:pointer;
  letter-spacing:.1em;transition:all .3s;
  box-shadow:0 2px 8px rgba(232,152,94,.3)
}
.seal-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(232,152,94,.4)}

/* ===== STAGE 4: SEALED ===== */
.sealed-scene{
  display:none;flex-direction:column;align-items:center;
  justify-content:center;min-height:60vh;text-align:center
}
.sealed-scene.active{display:flex}
.sealed-envelope{
  width:min(200px,40vw);height:min(130px,26vw);
  background:linear-gradient(145deg,#F5E6D3,#E8CCAA);
  border-radius:0 0 6px 6px;
  box-shadow:0 8px 30px rgba(0,0,0,.3);
  position:relative;animation:sealedIn .8s cubic-bezier(.4,0,.2,1) forwards;
  opacity:0;transform:scale(.5)
}
@keyframes sealedIn{to{opacity:1;transform:scale(1)}}
.sealed-envelope::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:55%;
  background:linear-gradient(180deg,#E8CCAA,#F0D8B8);
  clip-path:polygon(0 0,50% 70%,100% 0)
}
.sealed-seal-big{
  width:70px;height:70px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%,#E74C3C,var(--seal) 60%,#922B21);
  border:3px solid var(--seal-gold);
  box-shadow:0 2px 10px rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;
  margin-top:-20px;position:relative;z-index:2;
  animation:sealStamp .6s .4s cubic-bezier(.4,0,.2,1) both
}
@keyframes sealStamp{0%{transform:scale(0) rotate(-30deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.sealed-seal-big::after{content:'♥';font-size:26px;color:var(--seal-gold)}
.sealed-text{
  margin-top:24px;font-size:clamp(16px,3.5vw,20px);
  color:var(--brown);letter-spacing:.1em;line-height:1.8
}
.reopen-btn{
  margin-top:20px;padding:8px 24px;border:1px solid var(--gold);
  background:transparent;color:var(--brown);border-radius:20px;
  font-family:inherit;font-size:13px;cursor:pointer;
  letter-spacing:.05em;transition:all .3s
}
.reopen-btn:hover{background:var(--warm);color:#fff;border-color:var(--warm)}

/* Fold animation */
.letter-paper.folding{
  animation:foldUp 1.2s cubic-bezier(.4,0,.2,1) forwards
}
@keyframes foldUp{
  0%{transform:scale(1);opacity:1}
  50%{transform:scaleY(.3) scaleX(1.1);opacity:.8}
  100%{transform:scaleY(0) scaleX(.5);opacity:0}
}

/* Responsive */
@media(max-width:480px){
  .envelope-seal{width:45px;height:45px;right:20px;bottom:40px}
  .envelope-seal::after{font-size:16px}
  .envelope-stamp{width:40px;height:48px;font-size:22px}
}
</style>
</head>
<body>

<!-- STAGE 1: ENVELOPE -->
<div class="envelope-scene" id="envelopeScene" onclick="openEnvelope()">
  <div class="envelope-wrap">
    <div class="envelope-inner"></div>
    <div class="envelope-flap" id="envelopeFlap"></div>
    <div class="envelope-body">
      <div class="envelope-address">
        <div class="to">致：最爱的爸爸妈妈</div>
        <div>一封来自远方的家书</div>
      </div>
      <div class="envelope-stamp">📮</div>
      <div class="envelope-seal"></div>
    </div>
  </div>
  <div class="open-hint">— 点击打开 —</div>
</div>

<!-- STAGE 2: LETTER -->
<div class="letter-scene" id="letterScene">
  <div class="letter-paper" id="letterPaper">
    <div class="greeting">亲爱的爸爸妈妈：</div>
    <div class="date-line">武汉 · 某个想家的夜晚</div>
    <div id="letterContent"></div>
    <div class="sign-off" id="signOff">永远爱你们的孩子</div>
    <div class="page-nav" id="pageNav">
      <button id="prevBtn" onclick="changePage(-1)" disabled>← 上一页</button>
      <span class="page-num" id="pageNum">1 / 4</span>
      <button id="nextBtn" onclick="changePage(1)">下一页 →</button>
    </div>
  </div>
</div>

<!-- STAGE 3: SEALED -->
<div class="sealed-scene" id="sealedScene">
  <div class="sealed-envelope"></div>
  <div class="sealed-seal-big"></div>
  <div class="sealed-text">信已封好<br>心意已送达 ❤️</div>
  <button class="reopen-btn" onclick="reopenLetter()">重新打开</button>
</div>

<script>
const pages = [
  {
    theme: '🏠 家的温度',
    html: `
      <div class="theme-label">🏠 家的温度</div>
      <div class="letter-quote"><div class="q-sender">妈妈</div>后天就要变天了，注意天寒保暖，别让身体受凉。</div>
      <div class="letter-text">每次变天前，妈妈总会第一时间发来消息。那些看似普通的叮嘱，其实都是藏不住的牵挂。</div>
      <div class="letter-quote"><div class="q-sender">妈妈</div>快到武汉一月了，那里的环境怎么样，爸妈非常担心也很挂念身处武汉的你。</div>
      <div class="letter-text">一个人在外求学，最暖的莫过于知道有人在惦记着你。</div>
      <div class="letter-quote"><div class="q-sender">妈妈</div>你也别太大压力，心态要调好，争取一把过了。</div>
      <div class="letter-text">妈妈总是这样，一边叮嘱一边鼓励，怕我太累又怕我不够努力。</div>
    `
  },
  {
    theme: '🌱 成长足迹',
    html: `
      <div class="theme-label">🌱 成长足迹</div>
      <div class="letter-text">高考完那会儿，觉得考砸了，爸还在那安慰我能有书念就不错了。</div>
      <div class="letter-text">后面有和一群人每天看看书起床打卡，拍拍天空，叽叽喳喳讨论着可能的未来。</div>
      <div class="letter-text">十一点闹钟起床，十二点上班，九点半下班，十点到家，凌晨一两点折腾完AI。正好，学习AI，还能领工资。</div>
      <div class="letter-text">我才21，我不想就这样下去一直上班然后被动接受必须去使用AI，我想主动点，这是风险也是机遇。</div>
      <div class="letter-quote"><div class="q-sender">爸爸</div>过去的已经成为历史回不去了，你现在要计划现在，规划将来。</div>
    `
  },
  {
    theme: '👫 与树林的对话',
    html: `
      <div class="theme-label">👫 与树林的对话</div>
      <div class="letter-text">树林是一位我关注的博主，和她的对话总是能给我很多启发。</div>
      <div class="letter-text">我想给你和我妈拉个群，给你们看一下我在AI时代，我有什么进步。</div>
      <div class="letter-text">不夸张来讲，在接下来一两年，AI就会慢慢熟悉工作流程，去取代很多人。</div>
      <div class="letter-text">我想主动拥抱变化，而不是被动接受。这是风险，也是机遇。</div>
    `
  },
  {
    theme: '✨ 欢乐时光',
    html: `
      <div class="theme-label">✨ 欢乐时光</div>
      <div class="letter-quote"><div class="q-sender">爸爸</div>如果上班压力太大去看看祖国的大好河山也可以，但是你自己必须要解决经济问题。</div>
      <div class="letter-text">爸爸总是一边放飞一边务实，这种独特的幽默感大概是遗传不了的。</div>
      <div class="letter-text">小时候爸爸在外地，妈妈也忙着把我放在奶奶那里，我也没有怎么和人交往过，好久都是一个人待着。</div>
      <div class="letter-text">但现在不一样了，我有想做的事，有想保护的人，有正在书写的未来。</div>
      <div class="reply-area">
        <div class="theme-label">✉️ 写一封回信</div>
        <textarea id="replyText" placeholder="写下你想对爸爸妈妈说的话..."></textarea>
        <button class="seal-btn" onclick="sealLetter()">封装信件</button>
      </div>
    `
  }
];

let currentPage = 0;

function openEnvelope() {
  const flap = document.getElementById('envelopeFlap');
  flap.classList.add('open');
  setTimeout(() => {
    document.getElementById('envelopeScene').classList.add('gone');
    document.body.classList.add('letter-mode');
    setTimeout(() => {
      document.getElementById('envelopeScene').style.display = 'none';
      document.getElementById('letterScene').classList.add('active');
      renderPage(0);
    }, 600);
  }, 1200);
}

function renderPage(idx) {
  const content = document.getElementById('letterContent');
  const nav = document.getElementById('pageNav');
  const sign = document.getElementById('signOff');
  const paper = document.getElementById('letterPaper');

  paper.style.animation = 'none';
  paper.offsetHeight;
  paper.style.animation = 'paperIn .6s ease forwards';

  content.innerHTML = pages[idx].html;
  document.getElementById('pageNum').textContent = (idx + 1) + ' / ' + pages.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === pages.length - 1;
  nav.style.display = idx === pages.length - 1 ? 'none' : 'flex';
  sign.style.display = idx === pages.length - 1 ? 'none' : 'block';

  if (idx === pages.length - 1) {
    setTimeout(() => {
      const ta = document.getElementById('replyText');
      if (ta) ta.focus();
    }, 700);
  }
}

function changePage(dir) {
  const next = currentPage + dir;
  if (next < 0 || next >= pages.length) return;
  currentPage = next;
  renderPage(currentPage);
}

function sealLetter() {
  const text = document.getElementById('replyText').value.trim();
  if (!text) {
    document.getElementById('replyText').style.borderColor = '#E74C3C';
    setTimeout(() => { document.getElementById('replyText').style.borderColor = ''; }, 1500);
    return;
  }
  localStorage.setItem('family-reply', JSON.stringify({ text, date: new Date().toISOString() }));

  const paper = document.getElementById('letterPaper');
  paper.classList.add('folding');
  setTimeout(() => {
    document.getElementById('letterScene').classList.remove('active');
    document.getElementById('letterScene').style.display = 'none';
    document.getElementById('sealedScene').classList.add('active');
  }, 1200);
}

function reopenLetter() {
  document.getElementById('sealedScene').classList.remove('active');
  document.getElementById('letterPaper').classList.remove('folding');
  document.getElementById('letterScene').style.display = '';
  document.getElementById('letterScene').classList.add('active');
  currentPage = pages.length - 1;
  renderPage(currentPage);
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (!document.getElementById('letterScene').classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') changePage(1);
  if (e.key === 'ArrowLeft') changePage(-1);
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) changePage(dx < 0 ? 1 : -1);
});
</script>
</body>
</html>
