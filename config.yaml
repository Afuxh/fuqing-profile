# Hot News Aggregator Configuration
# 热点聚合网站配置文件 v4.0 — 三链驱动（AI从业者/投资人/创业者）

# ============ 网站基本信息 ============
site:
  title: "AI 先机"
  subtitle: "先判机会，后判热点"
  description: "面向AI从业者、投资人、创业者的智能热点聚合站。每天从13个顶级数据源精选热点，三条AI链分别点评行业视角、投资信号、创业机会，附带风险标注与行动指引。"
  author: "扶清"
  url: "https://afuxh.github.io/fuqing-profile/hot-news.html"  # 部署后的URL

# ============ 数据源配置 ============
sources:
  hackernews:
    enabled: true
    limit: 30               # 50→30 减少抓取量
  github:
    enabled: true
    queries: ["ai", "llm", "machine-learning"]
    days: 7
    limit: 10               # 15→10
  producthunt:
    enabled: true
    limit: 20               # 40→20
  # === 中文源 ===
  _36kr:
    enabled: true           # 36氪 RSS
    limit: 30
    rss_url: "https://36kr.com/feed"
  v2ex:
    enabled: false          # V2EX 热门
    limit: 30
    api_url: "https://www.v2ex.com/api/topics/hot.json"
  weibo:
    enabled: false          # 微博热搜（第三方API）
    limit: 20
    api_url: ""             # 填写你的API地址，留空使用默认第三方源
    # 支持的第三方API格式：返回 [{title, hot_score, url}, ...] 的JSON接口
    # 推荐：自建RSSHub、或使用 tenapi.cn 等公共服务
  # === AI热点源 ===
  aihot:
    enabled: true           # 卡兹克AI热点 https://aihot.virxact.com/
    base_url: "https://aihot.virxact.com/"
    limit: 40               # 抓取条数上限
    pages: 1                # 抓取页数（每页约20条）
    categories:             # 要抓取的分类（空=全部）
      - ""                  # 可选: ai-models, ai-products, industry, paper, tip
    # 该站为SSR渲染的HTML页面，通过解析正文提取
  jiqizhixin:
    enabled: false          # 机器之心 — WAF拦截，RSS不可用
    rss_url: "https://www.jiqizhixin.com/rss"
    limit: 20
  qbitai:
    enabled: true           # 量子位 https://www.qbitai.com
    rss_url: "https://www.qbitai.com/feed"
    limit: 20
  sspai:
    enabled: true           # 少数派 https://sspai.com
    rss_url: "https://sspai.com/feed"
    limit: 15
  ithome:
    enabled: false          # IT之家 — RSS 404，无可替代
    rss_url: "http://www.ithome.com/rss.xml"
    limit: 20
  huxiu:
    enabled: false          # 虎嗅 — RSS全部超时
    rss_url: "https://www.huxiu.com/rss/0.xml"
    limit: 20
  tmtpost:
    enabled: false          # 钛媒体 — RSS超时
    rss_url: "http://www.tmtpost.com/rss.xml"
    limit: 15
  geekpark:
    enabled: false          # 极客公园 — 站点连接超时
    rss_url: "http://feeds.geekpark.net/"
    limit: 15
  ifanr:
    enabled: true           # 爱范儿 https://www.ifanr.com/feed
    rss_url: "https://www.ifanr.com/feed"
    limit: 15
  pingwest:
    enabled: false          # 品玩 — 所有端点HTTP 405
    rss_url: "https://www.pingwest.com/feed"
    limit: 15
  cnbeta:
    enabled: true           # cnBeta https://www.cnbeta.com.tw（HTML抓取模式）
    rss_url: "https://www.cnbeta.com.tw/backend.php?mod=news"
    limit: 20
  williamlong:
    enabled: true           # 月光博客 https://feed.williamlong.info/
    rss_url: "https://feed.williamlong.info/"
    limit: 15
  techcrunch:
    enabled: true           # TechCrunch https://techcrunch.com/feed/
    rss_url: "https://techcrunch.com/feed/"
    limit: 15
  slashdot:
    enabled: true           # Slashdot https://slashdot.org/
    rss_url: "https://rss.slashdot.org/Slashdot/slashdotMain"
    limit: 15
  nikkei:
    enabled: true           # 日经亚洲 https://asia.nikkei.com/
    rss_url: "https://asia.nikkei.com/rss/feed"
    limit: 15
  zdnet:
    enabled: true           # ZDNet https://www.zdnet.com/
    rss_url: "https://www.zdnet.com/rss.xml"
    limit: 15
  # === 多领域扩展源 ===
  pengpai:
    enabled: false          # 澎湃新闻 — RSS重定向到首页，无替代
    rss_url: "https://www.thepaper.cn/rss/newsDetail.xml"
    limit: 20
  zhihu:
    enabled: false          # 知乎热榜 — 无官方RSS，RssHub不可用
    rss_url: "https://rsshub.app/zhihu/hotlist"
    limit: 20
  infzm:
    enabled: false          # 南方周末 — 所有RSS URL返回404
    rss_url: "https://rsshub.app/infzm/2"
    limit: 15
  zaobao:
    enabled: false          # 联合早报 — RSS返回HTML非XML
    rss_url: "https://rsshub.app/zaobao/realtime/china"
    limit: 15
  bbc:
    enabled: false          # BBC中文 — 国内超时（被墙），RssHub不可用
    rss_url: "https://rsshub.app/bbc/chinese"
    limit: 15
  arstechnica:
    enabled: true           # Ars Technica https://arstechnica.com/
    rss_url: "https://feeds.arstechnica.com/arstechnica/features"
    limit: 15
  theverge:
    enabled: true           # The Verge https://www.theverge.com/
    rss_url: "https://www.theverge.com/rss/index.xml"
    limit: 15
  npr:
    enabled: true           # NPR新闻 https://www.npr.org/
    rss_url: "https://feeds.npr.org/1001/rss.xml"
    limit: 15

  # === v3.9 价值标签驱动新增数据源（2026-06-05） ===
  # 每个源标注关联的价值标签，按需开启
  arxiv_ai:
    enabled: false          # arXiv CS.AI 🔬技术突破 — AI/ML 最新论文
    rss_url: "http://export.arxiv.org/rss/cs.AI"
    limit: 15
    value_tags: ["技术突破"]
  huggingface:
    enabled: false          # HuggingFace Blog 🔬技术突破 — 开源模型/数据集/社区动态
    rss_url: "https://huggingface.co/blog/feed.xml"
    limit: 15
    value_tags: ["技术突破"]
  openai_blog:
    enabled: false          # OpenAI Blog 🏢巨头布局 — 官方发布/研究方向
    rss_url: "https://openai.com/blog/rss.xml"
    limit: 15
    value_tags: ["巨头布局"]
  google_ai:
    enabled: false          # Google AI Blog 🏢巨头布局 — Google DeepMind/Research
    rss_url: "https://blog.research.google/feeds/posts/default?alt=rss"
    limit: 15
    value_tags: ["巨头布局"]
  mit_techreview:
    enabled: false          # MIT Technology Review 🏭产业落地 🌍社会影响
    rss_url: "https://www.technologyreview.com/feed/"
    limit: 15
    value_tags: ["产业落地", "社会影响"]
  thehackernews:
    enabled: false          # The Hacker News 🛡️安全合规 — 网络安全/AI安全
    rss_url: "https://feeds.feedburner.com/TheHackersNews"
    limit: 15
    value_tags: ["安全合规"]
  crunchbase:
    enabled: false          # Crunchbase News 📈投资风向 — AI创投/融资动态
    rss_url: "https://news.crunchbase.com/feed/"
    limit: 15
    value_tags: ["投资风向"]
  wired:
    enabled: false          # Wired 🌍社会影响 — 科技与社会交叉话题
    rss_url: "https://www.wired.com/feed/rss"
    limit: 15
    value_tags: ["社会影响", "产业落地"]

# ============ 去重配置 ============
dedup:
  enabled: true             # 是否启用多源去重
  fuzzy_threshold: 0.8      # 模糊匹配相似度阈值（0-1），越高越严格
  merge_sources: true       # 重复内容是否合并显示多来源标签

# ============ 评分系统 ============
scoring:
  # 档位配置（三档制：精选/推荐/参考，可改为四档制 S/A/B/C）
  levels:
    - name: "精选"
      threshold: 80
      color: "#c8786a"
      description: "高质量内容"
    - name: "推荐"
      threshold: 70
      color: "#b8956a"
      description: "值得阅读"
    - name: "参考"
      threshold: 60
      color: "#8a9598"
      description: "可作参考"
  
  # 关键词权重 — v4.0 三条链定向（AI从业者 / 投资人 / 创业者）
  keywords:
    # --- 核心关键词（每个命中 +15 分，标题命中额外 +8） ---
    core:
      # 🎯 AI从业者链 — 技术突破 + 工具提效 + 巨头动态
      practitioner:
        - ["大模型", "LLM", "GPT", "Claude", "Gemini", "开源模型", "SOTA"]
        - ["Agent", "智能体", "多模态", "推理", "RLHF", "MoE", "新架构"]
        - ["Copilot", "AI助手", "SDK", "API", "RAG", "Prompt", "微调"]
        - ["OpenAI", "Google DeepMind", "Anthropic", "Meta AI", "NVIDIA"]
        - ["论文", "benchmark", "基准测试", "上下文窗口"]
      # 📈 投资人链 — 融资/并购/估值 + 产业落地 + 巨头布局
      investor:
        - ["融资", "IPO", "收购", "并购", "独角兽", "估值", "市值"]
        - ["风投", "天使轮", "A轮", "SPAC", "退出", "二级市场"]
        - ["商业化", "SaaS", "PLG", "订阅制", "定价策略", "ARR"]
        - ["产业落地", "制造业AI", "医疗AI", "金融AI", "数字孪生"]
        - ["字节跳动", "百度AI", "阿里云", "腾讯AI", "华为AI"]
      # 🚀 创业者链 — 变现机会 + 产品发布 + 用户增长
      entrepreneur:
        - ["产品发布", "新功能", "公测", "beta", "Launch", "Product Hunt"]
        - ["变现", "AI付费", "创作者经济", "API定价", "免费增值"]
        - ["工作流", "自动化", "无代码", "低代码", "浏览器插件"]
        - ["小红书", "抖音", "短视频", "私域", "社群", "增长"]
        - ["创业", "从0到1", "PMF", "用户反馈", "留存"]
    # --- 扩展关键词（每个命中 +8 分） ---
    extended:
      - ["机器学习", "深度学习", "强化学习", "扩散模型", "生成式AI"]
      - ["数据隐私", "AI安全", "深度伪造", "模型安全", "合规"]
      - ["AI监管", "欧盟AI法案", "GDPR", "AI伦理", "可解释性"]
      - ["智慧城市", "工业4.0", "教育AI", "农业AI", "企业数字化"]
      - ["开源", "GitHub", "HuggingFace", "社区", "开发者"]
      - ["生产力", "效率", "自动化脚本", "模板", "快捷键"]
      - ["会员制", "付费墙", "广告变现", "电商AI", "跨境电商"]
      - ["产品矩阵", "生态", "战略发布", "合作", "联盟"]
      - ["ROI", "POC", "行业解决方案", "批量处理"]
      - ["数字鸿沟", "就业影响", "教育变革", "社会影响"]
    # --- 排除关键词（命中 -10 分） ---
    exclude:
      - ["股票", "基金", "投资理财", "娱乐", "明星", "游戏", "八卦"]
      - ["彩票", "体育", "综艺", "电视剧", "美食"]

# ============ AI 评论生成 — v4.0 三链驱动 ============
ai_insights:
  enabled: true            # 是否启用三链AI评论
  mode: "api"              # api=调用LLM自动生成
  # --- API模式配置 ---
  api:
    provider: "siliconflow"  # siliconflow / groq / deepseek / openai / custom
    endpoint: "https://api.siliconflow.cn/v1/chat/completions"
    api_key: "${SILICONFLOW_API_KEY}"  # 从环境变量读取
    model: "Qwen/Qwen3-8B"  # 免费模型: Qwen/Qwen3-8B, deepseek-ai/DeepSeek-V3
    max_tokens: 400
  # --- 生成范围 ---
  min_level: "参考"
  max_items: 100
  # --- 三链提示词模板 ---
  audiences:
    practitioner:
      label: "从业者视角"
      icon: "🔧"
      color: "#6ba3d6"
      prompts:
        perspective: "你是资深AI工程师。用1-2句中文点评以下内容的【技术价值】：架构创新、性能突破、工具链成熟度、对从业者的实际影响。标题：{title}。摘要：{summary}"
        action: "针对以下AI技术内容，给AI工程师/研究员一条【具体可操作建议】（≤40字）。标题：{title}"
    investor:
      label: "投资人视角"
      icon: "📈"
      color: "#d4a36b"
      prompts:
        perspective: "你是AI投资分析师。用1-2句中文点评以下内容的【投资信号】：市场格局变化、估值逻辑、商业化验证、竞争壁垒。标题：{title}。摘要：{summary}"
        action: "针对以下内容，给AI方向投资人一条【可验证行动】（≤40字）。标题：{title}"
        risk: "针对以下内容，指出【1个核心风险】（≤30字）：政策变化、竞争加剧、技术瓶颈、市场天花板。标题：{title}"
    entrepreneur:
      label: "创业者视角"
      icon: "🚀"
      color: "#7bc47f"
      prompts:
        perspective: "你是AI创业者。用1-2句中文点评以下内容的【创业机会】：PMF信号、用户痛点、变现路径、差异化空间。标题：{title}。摘要：{summary}"
        action: "针对以下内容，给AI创业者一条【7天可执行动作】（≤40字）。标题：{title}"
        risk: "针对以下内容，指出【1个创业者需警惕的风险】（≤30字）：巨头挤压、用户获取成本、技术门槛。标题：{title}"

# ============ Dashboard 仪表盘 — v4.0 赛道热度 + 风险标注 ============
dashboard:
  enabled: true              # 是否在首页展示仪表盘
  max_items: 10              # 赛道热度榜最多条目
  risk_threshold: 0.6        # 风险标注触发阈值（0-1）
  # 赛道定义
  tracks:
    - name: "大模型底座"
      keywords: ["大模型", "LLM", "GPT", "Claude", "Gemini", "模型", "开源模型", "SOTA"]
      color: "#6ba3d6"
    - name: "AI Agent"
      keywords: ["Agent", "智能体", "Copilot", "AI助手", "自动化"]
      color: "#7bc47f"
    - name: "AI 安全合规"
      keywords: ["AI安全", "数据隐私", "深度伪造", "AI监管", "欧盟AI法案", "GDPR"]
      color: "#d4756b"
    - name: "具身智能"
      keywords: ["机器人", "具身", "人形机器人", "自动驾驶", "硬件"]
      color: "#c8a45c"
    - name: "AI 投资融资"
      keywords: ["融资", "IPO", "收购", "独角兽", "估值", "风投", "天使轮"]
      color: "#d4a36b"
    - name: "AI 工具产品"
      keywords: ["产品发布", "新功能", "SaaS", "浏览器插件", "无代码", "低代码", "Product Hunt"]
      color: "#a087d4"
    - name: "AI 产业落地"
      keywords: ["产业落地", "制造业AI", "医疗AI", "金融AI", "数字孪生", "智慧城市"]
      color: "#5b9e8a"
    - name: "AI 社区开源"
      keywords: ["开源", "GitHub", "HuggingFace", "社区", "论文", "开发者", "benchmark"]
      color: "#8899aa"
  # 风险信号关键词（命中自动标注风险）
  risk_signals:
    - "裁员" 
    - "泡沫"
    - "监管"
    - "禁令"
    - "亏损"
    - "崩盘"
    - "安全事故"
    - "数据泄露"
    - "召回"
    - "诉讼"
    - "罚款"

# ============ 邮件订阅 ============
email:
  enabled: false
  send_mode: "both"         # auto=生成后自动发, manual=手动命令, both=两者都支持
  schedule: "daily"         # daily / weekly
  min_level: "精选"         # 只推送该级别及以上
  # --- SMTP配置 ---
  smtp_host: "smtp.qq.com"
  smtp_port: 587
  smtp_use_tls: true
  sender: ""                # 发件邮箱
  sender_name: "热点聚合"
  password: ""              # SMTP授权码（可从环境变量读取: ${EMAIL_PASSWORD}）
  recipients:
    - ""                    # 收件邮箱列表

# ============ 主题配置 ============
theme:
  mode: "dark"  # dark 或 light
  
  dark:
    background: "#121118"
    card: "rgba(28,26,35,0.65)"
    text_primary: "#e8e0d4"
    text_secondary: "#9a9284"
    accent: "#c8a45c"
    border: "rgba(150,140,120,0.1)"
  
  light:
    background: "#f8f5f0"
    card: "rgba(255,252,245,0.85)"
    text_primary: "#2c2822"
    text_secondary: "#6b655c"
    accent: "#a08050"
    border: "rgba(160,140,110,0.15)"

# ============ 动画配置 ============
animations:
  enabled: true
  breathe: true
  pulse: true
  float: true
  hover: true

# ============ 翻译配置 ============
translate:
  enabled: true
  # 翻译源：deep_translator (Google Translate)

# ============ 更新配置 ============
update:
  schedule: "0 1 * * *"
  timezone: "Asia/Shanghai"

# ============ 其他配置 ============
misc:
  show_score: true
  show_source: true
  show_update_time: true
  items_per_page: 20
  show_perspective: true    # 是否显示视角评论区域
  show_action: true         # 是否显示行动引导区域
  show_risk: true           # v4.0: 是否显示风险标注
  show_dashboard: true      # v4.0: 是否显示赛道热度仪表盘
  show_audience_switch: true # v4.0: 是否显示三链切换

