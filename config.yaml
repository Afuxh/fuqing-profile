# ============ AI 评论生成 ============
ai_insights:
  enabled: true            # 是否启用视角评论+行动引导
  mode: "api"              # api=调用LLM自动生成
  # --- API模式配置 ---
  # 使用硅基流动 SiliconFlow（国内免费、无需翻墙）
  # 注册地址：https://cloud.siliconflow.cn
  api:
    provider: "siliconflow"  # siliconflow / groq / deepseek / openai / custom
    endpoint: "https://api.siliconflow.cn/v1/chat/completions"
    api_key: "${SILICONFLOW_API_KEY}"  # 从环境变量读取
    model: "Qwen/Qwen3-8B"  # 免费模型: Qwen/Qwen3-8B, deepseek-ai/DeepSeek-V3
    max_tokens: 300
  # --- 生成范围 ---
  min_level: "参考"        # 为所有级别生成评论
  max_items: 100           # 最多生成条数（需 ≥ 展示卡片数）
  # --- 提示词模板 ---
  prompts:
    perspective: "你是AI时代观察者。用1-2句中文点评以下内容的行业价值，要有洞见。标题：{title}。摘要：{summary}"
    action: "针对以下AI相关内容，用1句中文给读者具体行动建议。标题：{title}"

# ============ 邮件订阅 ============
email:
  enabled: false
  send_mode: "both"         # auto=生成后自动发, manual=手动命令, both=两者都支持
  schedule: "daily"         # daily / weekly
  min_level: "精选"         # 只推送该级别及以上
  # --- SMTP配置 ---
  smtp_host: "smtp.qq.com"
  smtp_port: 587
  smtp_use_tls: true
  sender: ""                # 发件邮箱
  sender_name: "热点聚合"
  password: ""              # SMTP授权码（可从环境变量读取: ${EMAIL_PASSWORD}）
  recipients:
    - ""                    # 收件邮箱列表

# ============ 主题配置 ============
theme:
  mode: "dark"  # dark 或 light
  
  dark:
    background: "#121118"
    card: "rgba(28,26,35,0.65)"
    text_primary: "#e8e0d4"
    text_secondary: "#9a9284"
    accent: "#c8a45c"
    border: "rgba(150,140,120,0.1)"
  
  light:
    background: "#f8f5f0"
    card: "rgba(255,252,245,0.85)"
    text_primary: "#2c2822"
    text_secondary: "#6b655c"
    accent: "#a08050"
    border: "rgba(160,140,110,0.15)"

# ============ 动画配置 ============
animations:
  enabled: true
  breathe: true
  pulse: true
  float: true
  hover: true

# ============ 翻译配置 ============
translate:
  enabled: true
  # 翻译源：deep_translator (Google Translate)

# ============ 更新配置 ============
update:
  schedule: "0 1 * * *"
  timezone: "Asia/Shanghai"

# ============ 其他配置 ============
misc:
  show_score: true
  show_source: true
  show_update_time: true
  items_per_page: 20
  show_perspective: true    # 是否显示视角评论区域
  show_action: true         # 是否显示行动引导区域

